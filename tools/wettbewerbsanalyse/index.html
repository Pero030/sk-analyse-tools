<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wettbewerbsanalyse</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #eef2f7;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --border: #d8e1ec;
      --border-strong: #c7d2e0;
      --text: #172033;
      --text-soft: #5b6678;
      --primary: #172033;
      --primary-hover: #0f172a;
      --accent: #225ea8;
      --success: #13795b;
      --warning: #b26a00;
      --danger: #c62828;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      --radius-xl: 18px;
      --radius-lg: 14px;
      --transition: 0.18s ease;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.9), rgba(255,255,255,0) 30%), linear-gradient(180deg, #f4f7fb 0%, var(--bg) 100%);
      color: var(--text);
    }
    .app { max-width: 1600px; margin: 0 auto; padding: 32px 20px 40px; }
    .hero {
      margin-bottom: 22px;
      padding: 26px 28px;
      background: linear-gradient(135deg, #172033 0%, #22304a 100%);
      color: #fff;
      border-radius: 22px;
      box-shadow: var(--shadow);
    }
    .hero h1 { margin: 0 0 8px; font-size: 34px; letter-spacing: -0.02em; }
    .hero p { margin: 0; color: rgba(255,255,255,0.82); font-size: 15px; }
    .layout { display: grid; grid-template-columns: 320px minmax(0, 1fr); gap: 20px; align-items: start; }
    .panel, .competitor-board { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); box-shadow: var(--shadow); }
    .panel { padding: 20px; position: sticky; top: 20px; }
    .panel h2 { margin: 0 0 14px; font-size: 18px; }
    .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
    label { font-size: 13px; font-weight: 700; color: var(--text-soft); }
    input, textarea, select {
      width: 100%; border: 1px solid var(--border-strong); border-radius: 10px;
      padding: 10px 12px; font: inherit; background: #fff; color: var(--text);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    input, select { min-height: 44px; }
    textarea { min-height: 60px; resize: vertical; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #8ca3c4; box-shadow: 0 0 0 4px rgba(140, 163, 196, 0.18); }
    button {
      min-height: 44px; border: 0; border-radius: 10px; padding: 10px 14px;
      cursor: pointer; font-weight: 700; transition: transform var(--transition), background var(--transition);
    }
    button:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary { background: #e9eef5; color: var(--text); }
    .btn-secondary:hover { background: #dde6f0; }
    .btn-danger { background: var(--danger); color: #fff; }
    .section + .section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
    .competitor-board { padding: 24px; }
    .competitor-board h2 { margin: 0 0 20px; font-size: 18px; }
    .comparison-table { width: 100%; border-collapse: collapse; margin-top: 20px; overflow-x: auto; }
    .comparison-table th, .comparison-table td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border); }
    .comparison-table th { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-soft); font-weight: 700; background: var(--surface-soft); }
    .comparison-table th:first-child, .comparison-table td:first-child { text-align: left; font-weight: 700; }
    .comparison-table tr:hover { background: var(--surface-soft); }
    .score-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .score-1 { background: #fff1f1; color: var(--danger); }
    .score-2 { background: #fff4e7; color: var(--warning); }
    .score-3 { background: #e8f7ee; color: var(--success); }
    .score-own { background: var(--accent); color: #fff; }
    .competitor-card {
      border: 1px solid var(--border); border-radius: 16px; padding: 20px;
      background: linear-gradient(180deg, #fff 0%, #f8fafc 100%); margin-bottom: 16px;
    }
    .competitor-card h3 { margin: 0 0 12px; display: flex; justify-content: space-between; align-items: center; }
    .competitor-type { font-size: 12px; padding: 4px 12px; border-radius: 20px; }
    .type-direct { background: var(--danger); color: #fff; }
    .type-indirect { background: var(--warning); color: #fff; }
    .type-potential { background: var(--success); color: #fff; }
    .type-own { background: var(--accent); color: #fff; }
    .competitor-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 16px; }
    .competitor-metric { text-align: center; }
    .competitor-metric .label { font-size: 11px; color: var(--text-soft); text-transform: uppercase; }
    .competitor-metric .value { font-size: 20px; font-weight: 700; }
    .swot-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 24px; }
    .swot-box { border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .swot-box h4 { margin: 0 0 12px; font-size: 14px; text-transform: uppercase; }
    .swot-s { background: #e8f7ee; }
    .swot-w { background: #fff1f1; }
    .swot-o { background: #edf4ff; }
    .swot-t { background: #fff4e7; }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .panel { position: static; }
      .competitor-grid { grid-template-columns: 1fr; }
      .comparison-table { font-size: 12px; }
      .comparison-table th, .comparison-table td { padding: 8px; }
    }
    @media (max-width: 600px) { .swot-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1>Wettbewerbsanalyse</h1>
      <p>Wettbewerber analysieren – Stärken, Schwächen und Positionierung im Vergleich erfassen.</p>
    </section>

    <div class="layout">
      <aside class="panel">
        <div class="section">
          <h2>Wettbewerber hinzufügen</h2>
          <div class="field">
            <label for="competitorName">Name</label>
            <input id="competitorName" placeholder="z.B. Wettbewerber AG" />
          </div>
          <div class="field">
            <label for="competitorType">Typ</label>
            <select id="competitorType">
              <option value="Eigenes Unternehmen">Eigenes Unternehmen</option>
              <option value="Direkt">Direkter Wettbewerber</option>
              <option value="Indirekt">Indirekter Wettbewerber</option>
              <option value="Potenziell">Potenzieller Wettbewerber</option>
            </select>
          </div>
          <div class="field">
            <label for="competitorPrice">Preisniveau (1-3)</label>
            <select id="competitorPrice">
              <option value="1">1 - Niedrig</option>
              <option value="2">2 - Mittel</option>
              <option value="3">3 - Hoch</option>
            </select>
          </div>
          <div class="field">
            <label for="competitorQuality">Qualität (1-3)</label>
            <select id="competitorQuality">
              <option value="1">1 - Niedrig</option>
              <option value="2">2 - Mittel</option>
              <option value="3">3 - Hoch</option>
            </select>
          </div>
          <div class="field">
            <label for="competitorService">Service (1-3)</label>
            <select id="competitorService">
              <option value="1">1 - Niedrig</option>
              <option value="2">2 - Mittel</option>
              <option value="3">3 - Hoch</option>
            </select>
          </div>
          <div class="field">
            <label for="competitorInnovation">Innovation (1-3)</label>
            <select id="competitorInnovation">
              <option value="1">1 - Niedrig</option>
              <option value="2">2 - Mittel</option>
              <option value="3">3 - Hoch</option>
            </select>
          </div>
          <div class="field">
            <label for="competitorMarket">Marktanteil (%)</label>
            <input id="competitorMarket" type="number" placeholder="25" />
          </div>
          <div class="field">
            <label for="competitorNotes">Notizen</label>
            <textarea id="competitorNotes" placeholder="Besonderheiten, Stärken, Schwächen..."></textarea>
          </div>
          <button class="btn-primary" id="addBtn">Hinzufügen</button>
        </div>

        <div class="section">
          <h2>Aktionen</h2>
          <div style="display:grid;gap:10px;">
            <button class="btn-secondary" id="exampleBtn">Beispieldaten laden</button>
            <button class="btn-secondary" id="saveBtn">Speichern</button>
            <button class="btn-secondary" id="loadBtn">Laden</button>
            <button class="btn-danger" id="resetBtn">Zurücksetzen</button>
          </div>
        </div>
      </aside>

      <main class="competitor-board">
        <h2>Vergleichsmatrix</h2>
        <div style="overflow-x:auto;">
          <table class="comparison-table">
            <thead>
              <tr>
                <th>Unternehmen</th>
                <th>Typ</th>
                <th>Preis</th>
                <th>Qualität</th>
                <th>Service</th>
                <th>Innovation</th>
                <th>Marktanteil</th>
                <th>Gesamt</th>
              </tr>
            </thead>
            <tbody id="comparisonTableBody">
            </tbody>
          </table>
        </div>

        <h2 style="margin-top:32px;">Wettbewerber-Profile</h2>
        <div id="competitorCards">
          <p style="color:var(--text-soft);text-align:center;padding:40px;">Noch keine Wettbewerber erfasst</p>
        </div>
      </main>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'competitor_analysis_v1';
    let competitors = [];

    function uid() { return Math.random().toString(36).slice(2, 10); }

    function addCompetitor() {
      const name = document.getElementById('competitorName').value.trim();
      const type = document.getElementById('competitorType').value;
      const price = parseInt(document.getElementById('competitorPrice').value) || 2;
      const quality = parseInt(document.getElementById('competitorQuality').value) || 2;
      const service = parseInt(document.getElementById('competitorService').value) || 2;
      const innovation = parseInt(document.getElementById('competitorInnovation').value) || 2;
      const marketShare = parseFloat(document.getElementById('competitorMarket').value) || 0;
      const notes = document.getElementById('competitorNotes').value.trim();

      if (!name) { alert('Bitte einen Namen eingeben'); return; }

      const total = price + quality + service + innovation;

      competitors.push({ id: uid(), name, type, price, quality, service, innovation, marketShare, notes, total });
      saveState();
      render();

      document.getElementById('competitorName').value = '';
      document.getElementById('competitorMarket').value = '';
      document.getElementById('competitorNotes').value = '';
    }

    function deleteCompetitor(id) {
      competitors = competitors.filter(c => c.id !== id);
      saveState();
      render();
    }

    function getTypeClass(type) {
      const map = { 'Direkt': 'type-direct', 'Indirekt': 'type-indirect', 'Potenziell': 'type-potential', 'Eigenes Unternehmen': 'type-own' };
      return map[type] || 'type-indirect';
    }

    function render() {
      // Sort: own first, then by total score desc
      const sorted = [...competitors].sort((a, b) => {
        if (a.type === 'Eigenes Unternehmen') return -1;
        if (b.type === 'Eigenes Unternehmen') return 1;
        return b.total - a.total;
      });

      // Table
      const tbody = document.getElementById('comparisonTableBody');
      if (!competitors.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-soft);">Noch keine Wettbewerber erfasst</td></tr>';
      } else {
        tbody.innerHTML = sorted.map(c => `
          <tr style="${c.type === 'Eigenes Unternehmen' ? 'background:#edf4ff;' : ''}">
            <td><strong>${c.name}</strong></td>
            <td><span class="competitor-type ${getTypeClass(c.type)}">${c.type}</span></td>
            <td><span class="score-badge score-${c.price}">${c.price}</span></td>
            <td><span class="score-badge score-${c.quality}">${c.quality}</span></td>
            <td><span class="score-badge score-${c.service}">${c.service}</span></td>
            <td><span class="score-badge score-${c.innovation}">${c.innovation}</span></td>
            <td>${c.marketShare}%</td>
            <td><strong>${c.total}/12</strong></td>
          </tr>
        `).join('');
      }

      // Cards
      const cards = document.getElementById('competitorCards');
      if (!competitors.length) {
        cards.innerHTML = '<p style="color:var(--text-soft);text-align:center;padding:40px;">Noch keine Wettbewerber erfasst</p>';
      } else {
        cards.innerHTML = sorted.map(c => `
          <div class="competitor-card" style="${c.type === 'Eigenes Unternehmen' ? 'border-color:var(--accent);' : ''}">
            <h3>
              <span>${c.name}</span>
              <span style="display:flex;gap:8px;align-items:center;">
                <span class="competitor-type ${getTypeClass(c.type)}">${c.type}</span>
                <button class="btn-danger" style="min-height:28px;padding:4px 10px;font-size:11px;" onclick="deleteCompetitor('${c.id}')">×</button>
              </span>
            </h3>
            ${c.notes ? `<p style="color:var(--text-soft);margin:0 0 16px;">${c.notes}</p>` : ''}
            <div class="competitor-grid">
              <div class="competitor-metric">
                <div class="label">Preis</div>
                <div class="value">${c.price}/3</div>
              </div>
              <div class="competitor-metric">
                <div class="label">Qualität</div>
                <div class="value">${c.quality}/3</div>
              </div>
              <div class="competitor-metric">
                <div class="label">Service</div>
                <div class="value">${c.service}/3</div>
              </div>
              <div class="competitor-metric">
                <div class="label">Innovation</div>
                <div class="value">${c.innovation}/3</div>
              </div>
              <div class="competitor-metric">
                <div class="label">Gesamt</div>
                <div class="value" style="color:${c.total >= 10 ? 'var(--success)' : c.total >= 7 ? 'var(--warning)' : 'var(--danger)'}">${c.total}/12</div>
              </div>
              <div class="competitor-metric">
                <div class="label">Marktanteil</div>
                <div class="value">${c.marketShare}%</div>
              </div>
            </div>
          </div>
        `).join('');
      }
    }

    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(competitors)); }
    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) { try { competitors = JSON.parse(raw); return true; } catch {} }
      return false;
    }

    function loadExample() {
      competitors = [
        { id: uid(), name: 'Mein Unternehmen', type: 'Eigenes Unternehmen', price: 2, quality: 3, service: 2, innovation: 3, marketShare: 30, notes: 'Innovationsführer, mittleres Preissegment', total: 10 },
        { id: uid(), name: 'Wettbewerber A', type: 'Direkt', price: 1, quality: 2, service: 2, innovation: 1, marketShare: 35, notes: 'Billiganbieter, hoher Marktanteil durch Preis', total: 6 },
        { id: uid(), name: 'Wettbewerber B', type: 'Direkt', price: 3, quality: 3, service: 3, innovation: 2, marketShare: 20, notes: 'Premium-Anbieter, hohe Kundenzufriedenheit', total: 11 },
        { id: uid(), name: 'Wettbewerber C', type: 'Indirekt', price: 2, quality: 2, service: 1, innovation: 2, marketShare: 10, notes: 'Regionaler Anbieter, schwacher Service', total: 7 },
        { id: uid(), name: 'Startup X', type: 'Potenziell', price: 2, quality: 2, service: 2, innovation: 3, marketShare: 5, notes: 'Neuer Markteintritt, sehr innovativ', total: 9 }
      ];
      saveState();
      render();
    }

    document.getElementById('addBtn').addEventListener('click', addCompetitor);
    document.getElementById('exampleBtn').addEventListener('click', loadExample);
    document.getElementById('saveBtn').addEventListener('click', () => { saveState(); alert('Gespeichert!'); });
    document.getElementById('loadBtn').addEventListener('click', () => { if (loadState()) { render(); alert('Geladen!'); } else alert('Keine Daten'); });
    document.getElementById('resetBtn').addEventListener('click', () => { if (confirm('Zurücksetzen?')) { competitors = []; saveState(); render(); } });

    if (!loadState()) loadExample();
    else render();
  </script>
  <script src="header-loader.js"></script>
</body>
</html>
